# Gold-standard semantic-search queries for recall smoke tests.
# Each entry has a ``query`` and an ``expect`` list of docid_code or title
# substrings that must appear in top-10 results. Used by tests/test_recall.py
# against a sampled or full index.
- query: "R&D tax incentive eligibility"
  expect_substrings:
    - "Div 355"
    - "research and development"
- query: "small business CGT concessions"
  expect_substrings:
    - "Div 152"
    - "small business"
- query: "thin capitalisation rules"
  expect_substrings:
    - "thin capitalisation"
- query: "fringe benefits tax car benefits"
  expect_substrings:
    - "FBT"
    - "car"
- query: "GST on digital products"
  expect_substrings:
    - "GST"
    - "digital"
- query: "depreciation of intangible assets"
  expect_substrings:
    - "Div 40"
    - "depreci"
- query: "superannuation contribution caps"
  expect_substrings:
    - "contribution cap"
- query: "PAYG withholding obligations"
  expect_substrings:
    - "PAYG"
- query: "transfer pricing documentation"
  expect_substrings:
    - "transfer pricing"
- query: "capital works deductions"
  expect_substrings:
    - "Div 43"
    - "capital works"

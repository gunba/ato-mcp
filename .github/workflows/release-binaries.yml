name: release binaries

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach binaries to"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            asset: ato-mcp-x86_64-unknown-linux-gnu.tar.gz
            binary: target/release/ato-mcp
            archive: tar
          - os: macos-14
            asset: ato-mcp-aarch64-apple-darwin.tar.gz
            binary: target/release/ato-mcp
            archive: tar
          - os: windows-2022
            asset: ato-mcp-x86_64-pc-windows-msvc.zip
            binary: target/release/ato-mcp.exe
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release --locked
      - name: Package tar
        if: matrix.archive == 'tar'
        shell: bash
        run: |
          mkdir package
          cp "${{ matrix.binary }}" package/ato-mcp
          cp README.md LICENSE package/
          tar -C package -czf "${{ matrix.asset }}" .
      - name: Package zip
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package
          Copy-Item "${{ matrix.binary }}" package/ato-mcp.exe
          Copy-Item README.md package/
          Copy-Item LICENSE package/
          Compress-Archive -Path package/* -DestinationPath "${{ matrix.asset }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  publish:
    name: upload release assets
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Upload to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "$TAG" --notes "ato-mcp Rust binary release"
          gh release upload "$TAG" artifacts/*/* --clobber

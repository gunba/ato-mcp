name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    name: rust binary
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release --locked
      - name: Test
        run: cargo test --locked

  python-maintainer:
    name: python maintainer tooling
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install maintainer package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev,verify]'
      - name: Test
        run: pytest -q
